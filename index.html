<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7332433165688841" crossorigin="anonymous"></script>
<meta name="google-site-verification" content="bvyTU2fW5UN38CNywbvZF6Zw9Nk7aRC4TKkwh-1gF7c"/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝔎𝔲𝔟𝔞 OS</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6c5ce7;
  --primary-bright: #a29bfe;
  --accent: #74b9ff;
  --fav: #ff6b9d;
  --fav-glow: rgba(255,107,157,0.4);
  --gold: #ffd700;
  --gold-glow: rgba(255,215,0,0.35);

  --glass-thin: rgba(255,255,255,0.06);
  --glass-mid: rgba(255,255,255,0.10);
  --glass-strong: rgba(255,255,255,0.14);
  --glass-border: rgba(255,255,255,0.12);
  --glass-border-bright: rgba(255,255,255,0.25);
  --glass-blur: blur(24px) saturate(180%);
  --glass-blur-heavy: blur(40px) saturate(200%);

  --text: #ffffff;
  --text-sub: rgba(255,255,255,0.65);
  --text-muted: rgba(255,255,255,0.40);
  --navbar-h: 68px;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow-card: 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.08) inset;
  --shadow-glow-purple: 0 0 40px rgba(108,92,231,0.3);
}

*{box-sizing:border-box;margin:0;padding:0;outline:none;user-select:none;-webkit-tap-highlight-color:transparent}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.6)}60%{transform:scale(0.85)}100%{transform:scale(1)}}
@keyframes ripple{0%{transform:scale(0);opacity:0.6}100%{transform:scale(3);opacity:0}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(0.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}to{opacity:0;transform:translateX(-50%) translateY(10px) scale(0.95)}}
@keyframes cardEntrance{from{opacity:0;transform:translateY(20px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes windowOpen{from{opacity:0;transform:translateY(60px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes windowClose{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(60px) scale(0.96)}}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(0.97)}100%{transform:translate(0,0) scale(1)}}
@keyframes navGlow{0%,100%{box-shadow:0 1px 0 rgba(255,255,255,0.06) inset}50%{box-shadow:0 1px 0 rgba(255,255,255,0.12) inset}}
@keyframes starTwinkle{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:0.8;transform:scale(1.4)}}

body{
  font-family:'Outfit',sans-serif;
  background:#0a0a12;
  background-image:url('https://i.imgur.com/5753Ply.jpeg');
  background-size:cover;background-position:center;background-attachment:fixed;
  color:var(--text);
  height:100vh;width:100vw;overflow:hidden;
  display:flex;flex-direction:column;
}

/* Cinematic overlay layers */
body::before{
  content:'';position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(8,8,20,0.72) 0%,rgba(12,8,28,0.55) 50%,rgba(8,12,20,0.68) 100%);
  z-index:0;pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(108,92,231,0.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 20%,rgba(116,185,255,0.08) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 50% 100%,rgba(255,107,157,0.06) 0%,transparent 50%);
  z-index:0;pointer-events:none;animation:orbFloat 20s ease-in-out infinite;
}

/* Noise grain overlay */
.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ===== GLASS MIXIN ===== */
.glass{
  background:var(--glass-mid);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow-card);
}
.glass-heavy{
  background:rgba(12,10,28,0.75);
  backdrop-filter:var(--glass-blur-heavy);
  -webkit-backdrop-filter:var(--glass-blur-heavy);
  border:1px solid var(--glass-border);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.1) inset;
}

/* ===== NAVBAR ===== */
#navbar{
  width:100%;height:var(--navbar-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  z-index:200;
  position:relative;
  background:rgba(10,8,24,0.6);
  backdrop-filter:blur(30px) saturate(200%);
  -webkit-backdrop-filter:blur(30px) saturate(200%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 4px 24px rgba(0,0,0,0.3);
  animation:navGlow 8s ease-in-out infinite;
}

.logo-section{display:flex;align-items:center;gap:24px}

.logo{
  font-size:26px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(130deg,#ffffff 0%,#d4c7ff 40%,#a29bfe 70%,#74b9ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(162,155,254,0.5));
  transition:filter 0.3s;cursor:default;
}
.logo:hover{filter:drop-shadow(0 0 30px rgba(162,155,254,0.8));}

.nav-links{display:flex;gap:6px}

.pill-btn{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text-sub);
  padding:7px 15px;border-radius:50px;
  font-size:11.5px;font-weight:600;
  cursor:pointer;letter-spacing:0.4px;text-transform:uppercase;
  font-family:'Outfit',sans-serif;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.pill-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  opacity:0;transition:opacity 0.3s;
}
.pill-btn:hover{
  color:#fff;background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.3);
  transform:translateY(-2px) scale(1.04);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.15);
}
.pill-btn:hover::before{opacity:1}
.pill-btn:active{transform:scale(0.96);transition-duration:0.1s}

.nav-right{display:flex;align-items:center;gap:12px}

.search-wrap{position:relative;width:320px}
#search-input{
  width:100%;padding:11px 18px 11px 44px;border-radius:50px;
  font-size:13.5px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);color:white;
  font-family:'Outfit',sans-serif;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(10px);
}
#search-input::placeholder{color:var(--text-muted)}
#search-input:focus{
  background:rgba(255,255,255,0.12);border-color:rgba(162,155,254,0.6);
  box-shadow:0 0 0 3px rgba(108,92,231,0.2),0 4px 20px rgba(0,0,0,0.3);
  width:360px;
}
.search-icon{
  position:absolute;left:15px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:15px;pointer-events:none;
  transition:color 0.3s;
}
#search-input:focus~.search-icon,.search-wrap:focus-within .search-icon{color:var(--primary-bright)}

#settings-btn{
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.07);
  color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:blur(10px);
}
#settings-btn:hover{
  background:linear-gradient(135deg,rgba(108,92,231,0.6),rgba(116,185,255,0.4));
  border-color:rgba(162,155,254,0.5);
  transform:rotate(90deg) scale(1.1);
  box-shadow:0 0 20px rgba(108,92,231,0.4);
}

/* ===== BOTTOM LABELS ===== */
#id-wrapper{
  position:fixed;bottom:14px;left:16px;z-index:9999;
  display:flex;flex-direction:column;align-items:flex-start;gap:5px;
}
#admin-hover-btn{
  opacity:0;transform:translateY(8px);pointer-events:none;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;padding:6px 13px;border-radius:10px;
  font-size:10px;font-weight:700;border:none;
  box-shadow:0 6px 20px rgba(108,92,231,0.5);
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  cursor:pointer;text-transform:uppercase;letter-spacing:0.6px;
  font-family:'Outfit',sans-serif;
}
#id-wrapper:hover #admin-hover-btn{opacity:1;transform:translateY(0);pointer-events:auto}
#overlay-id{padding:7px 14px;border-radius:11px;font-size:12px;font-weight:600;color:white}
#overlay-active{
  position:fixed;bottom:14px;right:16px;
  padding:7px 14px;border-radius:11px;font-size:12px;
  font-weight:600;color:white;z-index:9999;pointer-events:none;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;background:#00d084;
  display:inline-block;margin-right:6px;
  box-shadow:0 0 8px rgba(0,208,132,0.8);
  animation:pulse 2.5s ease-in-out infinite;
}

/* ===== HOME BAR ===== */
#home-bar-area{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:160px;height:24px;display:flex;justify-content:center;
  align-items:flex-end;padding-bottom:6px;cursor:pointer;z-index:5002;
}
#home-bar{
  width:134px;height:5px;background:rgba(255,255,255,0.35);
  border-radius:100px;
  box-shadow:0 1px 6px rgba(0,0,0,0.4);
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
#home-bar-area:hover #home-bar{
  width:100px;background:rgba(255,255,255,0.7);
  box-shadow:0 0 12px rgba(255,255,255,0.4);
  transform:scaleY(1.4);
}
#home-bar-area:active #home-bar{transform:scaleY(0.7);opacity:0.5}

/* ===== MAIN CONTENT ===== */
#main-content{
  flex:1;overflow-y:auto;
  padding:36px 36px 80px;
  z-index:5;scroll-behavior:smooth;
  width:100%;max-width:1700px;margin:0 auto;
}
#main-content.locked{overflow:hidden}

/* Custom scrollbar */
#main-content::-webkit-scrollbar{width:6px}
#main-content::-webkit-scrollbar-track{background:transparent}
#main-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
#main-content::-webkit-scrollbar-thumb:hover{background:rgba(162,155,254,0.5)}

/* ===== SECTION TITLES ===== */
.section-header{
  display:flex;align-items:center;gap:14px;
  margin-bottom:22px;
  animation:fadeUp 0.6s ease both;
}
.section-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  position:relative;
}
.section-dot::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  opacity:0.4;animation:pulse 3s ease-in-out infinite;
}
.dot-gold{background:var(--gold);box-shadow:0 0 12px var(--gold)}
.dot-gold::after{background:var(--gold)}
.dot-purple{background:var(--primary);box-shadow:0 0 12px var(--primary)}
.dot-purple::after{background:var(--primary)}
.dot-pink{background:var(--fav);box-shadow:0 0 12px var(--fav)}
.dot-pink::after{background:var(--fav)}

h2.section-title{
  font-size:22px;font-weight:700;color:white;letter-spacing:-0.3px;
}

/* ===== FAVORITES ===== */
#favorites-section{margin-bottom:44px;transition:all 0.4s ease}
#favorites-section.hidden{display:none}
#favorites-empty{
  display:none;align-items:center;gap:14px;
  padding:20px 24px;border-radius:16px;
  background:rgba(255,107,157,0.04);
  border:1px dashed rgba(255,107,157,0.2);
  color:rgba(255,255,255,0.38);font-size:13.5px;
  margin-bottom:44px;
  animation:fadeIn 0.4s ease;
}
#favorites-empty.show{display:flex}
#favorites-empty .heart-empty{font-size:22px;opacity:0.5}

/* ===== GAMES GRID ===== */
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:20px;margin-bottom:48px;
}
#exclusiveGrid{grid-template-columns:repeat(5,1fr)}

/* ===== GAME CARD ===== */
.game-card{
  border-radius:20px;overflow:hidden;position:relative;
  background:var(--glass-thin);
  border:1px solid rgba(255,255,255,0.07);
  cursor:pointer;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.4s ease,
             border-color 0.3s ease,
             background 0.3s ease;
  animation:cardEntrance 0.5s ease both;
  will-change:transform;
}
.game-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0));
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:1;
}
.game-card:hover{
  transform:translateY(-10px) scale(1.03);
  background:rgba(255,255,255,0.11);
  border-color:rgba(255,255,255,0.22);
  box-shadow:0 24px 48px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.12),0 1px 0 rgba(255,255,255,0.2) inset;
}
.game-card:hover::before{opacity:1}
.game-card:active{transform:translateY(-4px) scale(0.99);transition-duration:0.1s}

#exclusiveGrid .game-card:hover{
  border-color:rgba(255,215,0,0.5);
  box-shadow:0 24px 48px rgba(0,0,0,0.55),0 0 30px rgba(255,215,0,0.2),0 0 0 1px rgba(255,215,0,0.2);
}

.game-thumb-wrap{width:100%;padding-top:100%;position:relative;overflow:hidden}
.game-thumb{
  position:absolute;top:0;left:0;width:100%;height:100%;
  object-fit:cover;transition:transform 0.6s cubic-bezier(0.25,0.8,0.25,1),filter 0.4s ease;
  filter:brightness(0.92);
}
.game-card:hover .game-thumb{transform:scale(1.1);filter:brightness(1.05) saturate(1.1)}

/* Card shine effect */
.card-shine{
  position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(105deg,transparent 20%,rgba(255,255,255,0.08) 50%,transparent 80%);
  z-index:2;pointer-events:none;transition:left 0.6s ease;
}
.game-card:hover .card-shine{left:150%}

.game-info{
  padding:11px 14px;
  border-top:1px solid rgba(255,255,255,0.06);
  background:linear-gradient(to bottom,rgba(255,255,255,0.03),rgba(0,0,0,0.15));
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.game-title{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.88);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}

/* ===== FAV BUTTON ===== */
.fav-btn{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.22);
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink:0;position:relative;z-index:3;overflow:hidden;
}
.fav-btn::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,157,0.3) 0%,transparent 70%);
  transform:scale(0);transition:transform 0.3s ease;
}
.fav-btn:hover{
  background:rgba(255,107,157,0.15);color:var(--fav);
  transform:scale(1.25);
  box-shadow:0 0 12px rgba(255,107,157,0.3);
}
.fav-btn:hover::before{transform:scale(1)}
.fav-btn.active{
  background:rgba(255,107,157,0.15);color:var(--fav);
  box-shadow:0 0 10px rgba(255,107,157,0.35);
}
.fav-btn.active:hover{background:rgba(255,107,157,0.25)}
.fav-btn.popping{animation:heartPop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards}

/* ===== APP WINDOW ===== */
#app-window{
  position:fixed;inset:0;background:#000;z-index:5000;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transform:translateY(40px) scale(0.97);
  transition:opacity 0.45s cubic-bezier(0.25,0.8,0.25,1),
             transform 0.45s cubic-bezier(0.25,0.8,0.25,1);
}
#app-window.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
#app-content{flex:1;width:100%;height:100%}
#app-content iframe{width:100%;height:100%;border:none}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:78px;left:50%;
  transform:translateX(-50%) translateY(14px) scale(0.95);
  background:rgba(18,15,35,0.92);
  border:1px solid rgba(255,255,255,0.14);
  color:white;padding:11px 22px;border-radius:50px;
  font-size:13px;font-weight:600;
  z-index:9998;opacity:0;pointer-events:none;
  backdrop-filter:blur(24px);white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transition:none;
}
#toast.show{animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards}
#toast.hide{animation:toastOut 0.3s ease forwards}
#toast.fav-add{
  border-color:rgba(255,107,157,0.5);
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 20px rgba(255,107,157,0.25);
}

/* ===== MODALS ===== */
#settings-modal{
  display:none;position:fixed;top:80px;right:20px;
  width:380px;padding:26px;border-radius:24px;z-index:6000;
  animation:slideDown 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
#settings-modal h3{
  margin-bottom:18px;color:white;font-size:17px;font-weight:700;
  letter-spacing:-0.2px;
}
.settings-section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text-muted);margin-bottom:10px;margin-top:16px;
}
.wallpaper-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
.wp-option{
  height:64px;border-radius:12px;cursor:pointer;
  border:2px solid transparent;background-size:cover;background-position:center;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;overflow:hidden;
}
.wp-option::after{
  content:'';position:absolute;inset:0;border-radius:10px;
  background:rgba(255,255,255,0);transition:background 0.2s;
}
.wp-option:hover{transform:scale(1.06);border-color:rgba(255,255,255,0.6);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.wp-option:hover::after{background:rgba(255,255,255,0.1)}
#custom-wp-input{
  width:100%;padding:11px 14px;border-radius:12px;
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);
  color:white;font-family:'Outfit',sans-serif;font-size:13px;
  transition:all 0.3s ease;margin-bottom:12px;
}
#custom-wp-input:focus{border-color:rgba(162,155,254,0.5);background:rgba(0,0,0,0.5);box-shadow:0 0 0 3px rgba(108,92,231,0.2)}
.btn-row{display:flex;gap:10px}
.action-btn{
  flex:1;padding:11px;border-radius:12px;border:none;
  font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:13px;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.save-btn{
  background:linear-gradient(135deg,var(--primary),#5048d6);color:white;

}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(108,92,231,0.6)}
.save-btn:active{transform:scale(0.97)}
.close-modal-btn{background:rgba(255,255,255,0.08);color:white;border:1px solid rgba(255,255,255,0.1)}
.close-modal-btn:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px)}

/* Info Modal */
#info-modal{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.95);
  width:580px;max-height:80vh;
  padding:32px;border-radius:28px;z-index:6500;
  flex-direction:column;opacity:0;pointer-events:none;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
#info-modal.active{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
#info-title{
  font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:18px;
  background:linear-gradient(130deg,#fff,var(--primary-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:16px;
}
#info-body{flex:1;overflow-y:auto;font-size:13.5px;line-height:1.7;color:rgba(255,255,255,0.75);padding-right:8px}
#info-body p{margin-bottom:14px}
#info-body strong{color:white}
#info-body a{color:var(--primary-bright);text-decoration:none}
#info-body a:hover{text-decoration:underline}
.info-close{
  position:absolute;top:18px;right:22px;font-size:26px;cursor:pointer;
  color:rgba(255,255,255,0.4);transition:all 0.2s;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
}
.info-close:hover{color:white;background:rgba(255,255,255,0.1)}

/* ===== ADMIN ===== */
#banOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.97);color:#ff3333;
  font-size:36px;font-weight:900;text-transform:uppercase;
  letter-spacing:2px;text-align:center;padding-top:40vh;z-index:20000;
}
#banPopup{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20001;width:340px;padding:28px;border-radius:24px;
  background:rgba(12,10,28,0.96);backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}
#banPopup h2{margin-bottom:18px;font-size:18px;text-align:center;color:var(--primary-bright);font-weight:800}
#banPopup input{
  width:100%;margin-bottom:12px;padding:13px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.4);
  color:white;font-family:'Outfit',sans-serif;font-size:13px;
}
#banPopup button{
  margin:5px 0;width:100%;padding:13px;cursor:pointer;
  background:var(--primary);border:none;border-radius:12px;
  color:white;font-weight:700;transition:all 0.25s;
  font-family:'Outfit',sans-serif;
}
#banPopup button:hover{opacity:0.9;transform:scale(1.02)}
.close-btn{position:absolute;top:14px;right:18px;cursor:pointer;font-size:22px;color:#ff4757;transition:0.2s}
.close-btn:hover{transform:scale(1.2)}

/* ===== NO RESULTS ===== */
#no-results{display:none;text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);font-size:15px}
#no-results.show{display:block;animation:fadeIn 0.4s ease}
#no-results .emoji{font-size:38px;margin-bottom:12px;display:block}

/* ===== MOBILE ===== */
@media(max-width:768px){
  #navbar{padding:0 18px;height:58px}

}

function openInfoModal(type){
  const modal=document.getElementById('info-modal');
  const title=document.getElementById('info-title');
  const body=document.getElementById('info-body');
  const main=document.getElementById('main-content');
  if(type==='privacy'){title.textContent="Privacy Policy";body.innerHTML=privacyText}
  else if(type==='dmca'){title.textContent="DMCA Policy";body.innerHTML=dmcaText}
  else if(type==='contact'){title.textContent="Contact Us";body.innerHTML=contactText}
  modal.style.display='flex';
  setTimeout(()=>modal.classList.add('active'),10);
  main.classList.add('locked');
}
function closeInfoModal(){
  const modal=document.getElementById('info-modal');
  modal.classList.remove('active');
  document.getElementById('main-content').classList.remove('locked');
  setTimeout(()=>modal.style.display='none',400);
}

/* ===== FAVORITES ===== */
let favorites=JSON.parse(localStorage.getItem('kubaOS_favorites')||'[]');
function saveFavorites(){localStorage.setItem('kubaOS_favorites',JSON.stringify(favorites))}
function isFavorite(name){return favorites.includes(name)}
function toggleFavorite(name){
  if(isFavorite(name)){
    favorites=favorites.filter(f=>f!==name);
    showToast('Removed from favorites','');
  }else{
    favorites.push(name);
    showToast('❤️ Added to favorites!','fav-add');
  }
  saveFavorites();
  syncFavButtons(name);
  renderFavoritesSection();
}
function syncFavButtons(name){
  document.querySelectorAll(`.fav-btn[data-game="${CSS.escape(name)}"]`).forEach(btn=>{
    const a=isFavorite(name);
    btn.classList.toggle('active',a);
    btn.title=a?'Remove from favorites':'Add to favorites';
    btn.textContent=a?'♥':'♡';
  });
}
function renderFavoritesSection(){
  const sec=document.getElementById('favorites-section');
  const grid=document.getElementById('favoritesGrid');
  const empty=document.getElementById('favorites-empty');
  grid.innerHTML='';
  const favGames=[...exclusiveApps,...libraryGames].filter(g=>favorites.includes(g.name));
  if(favGames.length===0){sec.classList.add('hidden');empty.classList.add('show')}
  else{
    sec.classList.remove('hidden');empty.classList.remove('show');
    favGames.forEach((g,i)=>{
      const card=createCard(g,'favorites',true);
      card.style.animationDelay=`${i*0.04}s`;
      grid.appendChild(card);
    });
  }
}

/* ===== TOAST ===== */
let toastTimer=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+(type||'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    t.className='hide';
    setTimeout(()=>t.className='',300);
  },2200);
}

/* ===== CARD CREATION ===== */
function createCard(game,sectionId){
  const card=document.createElement('div');
  card.className='game-card';
  card.dataset.name=game.name.toLowerCase();
  card.dataset.section=sectionId;
  const favActive=isFavorite(game.name);
  card.innerHTML=`
    <div class="game-thumb-wrap">
      <img class="game-thumb" src="${game.img}" alt="${game.name}" loading="lazy">
      <div class="card-shine"></div>
    </div>
    <div class="game-info">
      <div class="game-title">${game.name}</div>
      <button class="fav-btn ${favActive?'active':''}" data-game="${game.name}"
        title="${favActive?'Remove from favorites':'Add to favorites'}">${favActive?'♥':'♡'}</button>
    </div>`;
  card.addEventListener('click',e=>{
    if(e.target.classList.contains('fav-btn'))return;
    if(game.newTab)window.open(game.url,'_blank');
    else embedGame(game.url);
  });
  card.querySelector('.fav-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const btn=e.currentTarget;
    btn.classList.add('popping');
    btn.addEventListener('animationend',()=>btn.classList.remove('popping'),{once:true});
    toggleFavorite(game.name);
  });
  return card;
}

/* ===== STAGGERED INIT ===== */
function initGames(){
  const exGrid=document.getElementById('exclusiveGrid');
  const libGrid=document.getElementById('gamesGrid');
  exclusiveApps.forEach((g,i)=>{
    const c=createCard(g,'exclusive');
    c.style.animationDelay=`${0.1+i*0.06}s`;
    exGrid.appendChild(c);
  });
  libraryGames.forEach((g,i)=>{
    const c=createCard(g,'library');
    c.style.animationDelay=`${0.2+i*0.025}s`;
    libGrid.appendChild(c);
  });
  renderFavoritesSection();
}

/* ===== SEARCH ===== */
function filterGames(q){
  const lq=q.trim().toLowerCase();
  const allCards=document.querySelectorAll('#exclusiveGrid .game-card,#gamesGrid .game-card');
  let exVis=0,total=0;
  allCards.forEach(c=>{
    const match=c.dataset.name.includes(lq);
    c.style.display=match?'':'none';
    if(match){total++;if(c.dataset.section==='exclusive')exVis++}
  });
  const exTitle=document.querySelector('#exclusiveGrid').previousElementSibling;
  const exGrid=document.getElementById('exclusiveGrid');
  exTitle.style.display=exVis===0?'none':'';
  exGrid.style.display=exVis===0?'none':'';
  document.getElementById('no-results').classList.toggle('show',total===0);
  const favSec=document.getElementById('favorites-section');
  const favEmpty=document.getElementById('favorites-empty');
  if(lq.length>0){favSec.classList.add('hidden');favEmpty.classList.remove('show')}
  else renderFavoritesSection();
}
const si=document.getElementById('search-input');
si.addEventListener('input',e=>filterGames(e.target.value));
si.addEventListener('keydown',e=>{if(e.key==='Escape'){e.target.value='';filterGames('')}});

initGames();

/* ===== APP WINDOW ===== */
function embedGame(url){
  const win=document.getElementById('app-window');
  const content=document.getElementById('app-content');
  const main=document.getElementById('main-content');
  content.innerHTML=`<iframe src="${url}" allow="fullscreen;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe>`;
  win.classList.add('open');
  main.classList.add('locked');
}
function closeApp(){
  const win=document.getElementById('app-window');
  const main=document.getElementById('main-content');
  win.classList.remove('open');
  main.classList.remove('locked');
  setTimeout(()=>{document.getElementById('app-content').innerHTML=''},450);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('app-window').classList.contains('open'))closeApp();
});

}

    const email=prompt('Admin email:');const pw=prompt('Password:');
    if(!email||!pw)return;
    const u=await auth.signInWithEmailAndPassword(email,pw);
    if(u.user){isAdmin=true;document.getElementById('banPopup').style.display='block'}
  }catch(e){alert('Login failed: '+e.message)}
}

async function banPlayer(){
  if(!isAdmin)return alert('Admin only');
  const id=document.getElementById('banNumber').value.trim();
  if(!/^\d{6}$/.test(id))return alert('Invalid ID');
  await db.collection('bans').doc(id).set({id,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
  alert(`User ${id} banned!`);
}
async function unbanPlayer(){
  if(!isAdmin)return alert('Admin only');
  const id=document.getElementById('banNumber').value.trim();
  await db.collection('bans').doc(id).delete();
  alert(`User ${id} unbanned`);
}
