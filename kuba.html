<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba OS | Moving to New Site</title>
    <!-- High-end Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bright-purple: #C084FC;
            --deep-purple: #7E22CE;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(192, 132, 252, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Deep purple background glow */
            background: radial-gradient(circle at center, #120621 0%, #050505 100%);
        }

        /* The "Nebula" Moving Glow */
        .ambient-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(126, 34, 206, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            animation: moveGlow 10s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.2); }
        }

        /* The Million Dollar Glass Box */
        .main-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            max-width: 500px;
            width: 90%;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Big Pro Logo */
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff 20%, var(--bright-purple) 40%, #E9D5FF 60%, #fff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .os-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--bright-purple);
            margin-bottom: 40px;
            font-weight: 800;
            opacity: 0.8;
        }

        /* Simple Text */
        .status-msg {
            font-weight: 300;
            font-size: 1.1rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* Pro Loading Bar */
        .bar-bg {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: var(--bright-purple);
            box-shadow: 0 0 20px var(--bright-purple);
        }

        /* The "Old Link" Professional Button */
        .btn-secondary {
            display: inline-block;
            padding: 12px 28px;
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            background: rgba(192, 132, 252, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(192, 132, 252, 0.2);
            border-color: var(--bright-purple);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .redirect-text {
            display: block;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="main-card">
        <div class="logo">Kuba</div>
        <div class="os-badge">Operating System</div>
        
        <p class="status-msg">
            This website has been updated.<br>
            Taking you to the new site now...
        </p>
        
        <div class="bar-bg">
            <div class="bar-fill" id="fill"></div>
        </div>

        <a href="https://kuba.fireyh8.workers.dev/" class="btn-secondary">
            Go to the old website
        </a>

        <span class="redirect-text">Redirecting in a few seconds...</span>
    </div>

    <script>
        const destination = "https://kubaz.pages.dev/";
        const timeLimit = 4000; // 4 seconds
        const fill = document.getElementById('fill');
        
        let start = null;
        function step(timestamp) {
            if (!start) start = timestamp;
            const progress = timestamp - start;
            const width = Math.min((progress / timeLimit) * 100, 100);
            
            fill.style.width = width + "%";

            if (progress < timeLimit) {
                window.requestAnimationFrame(step);
            } else {
                window.location.href = destination;
            }
        }

        // Small delay to let the page load visually
        setTimeout(() => {
            window.requestAnimationFrame(step);
        }, 800);
    </script>
</body>
</html>
